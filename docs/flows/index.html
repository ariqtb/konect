<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konect — ML Relevance Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 40px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .subtitle { color: #848d97; font-size: 15px; margin-bottom: 32px; }
  .diagram-container { background: #161b22; border-radius: 12px; padding: 32px; border: 1px solid #30363d; overflow-x: auto; }
  .diagram-container svg { max-width: 100%; height: auto; display: block; }
  .loading { color: #848d97; font-size: 14px; padding: 20px 0; }
  .error-msg { color: #ff7b72; font-size: 13px; padding: 8px 12px; background: #2d1b1b; border-radius: 6px; margin-top: 8px; border: 1px solid #da3633; white-space: pre-wrap; }
  .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #21262d; font-size: 13px; color: #848d97; display: flex; gap: 16px; }
  .footer a { color: #58a6ff; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

  <h1>ML Relevance Scoring — Flow</h1>
  <p class="subtitle">Pipeline: user post → embedding → relevance scoring → graph visualization</p>

  <div class="diagram-container" id="container">
    <div class="loading">Rendering diagram…</div>
  </div>

  <div class="footer">
    <a href="./relevance-flow.mmd">relevance-flow.mmd</a>
    <a href="./../prd/ml-relevance-scoring.md">PRD →</a>
  </div>

<script type="module">
import { renderMermaidSVGAsync, THEMES } from 'beautiful-mermaid'

async function main() {
  const container = document.getElementById('container')

  try {
    const resp = await fetch('./relevance-flow.mmd')
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`)
    const source = await resp.text()
    const cleaned = source.replace(/^---[\s\S]*?---\n/, '')
    const svg = await renderMermaidSVGAsync(cleaned, {
      ...THEMES['github-dark'],
      transparent: true,
      font: 'JetBrains Mono, Inter, sans-serif',
    })
    container.innerHTML = svg
  } catch (err) {
    container.innerHTML = `<div class="error-msg">${err.message}</div>`
  }
}

main()
</script>
</body>
</html>
